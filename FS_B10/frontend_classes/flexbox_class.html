<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox In CSS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
        }
        .container{
            display: flex;
            height: 100vh;
            background-color: #a1f1e4;
            /* flex-direction: column-reverse; */
            /* flex-wrap: wrap; */
            /* row-gap: 12px; */
            /* column-gap: 30px; */

            flex-flow: column wrap;

        }
        .items{
            background-color: #f521d9;
            color: #000;
            height: 100px;
            width: 100px;
            /* margin: 12px; */
            border: solid;
            font-size: 3rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="items">1</div>
        <div class="items">2</div>
        <div class="items">3</div>
        <div class="items">4</div>
        <div class="items">5</div>
    </div>

</body>

</html>
