<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="timer-app">
            <div class="header">
                <h1>Pomodoro Timer</h1>
                <p class="subtitle">Stay focused and productive</p>
            </div>
            
            <div class="timer-section">
                <div class="timer-display">
                    <div class="timer-label" id="timerLabel">Work Time</div>
                    <div class="timer-circle">
                        <svg class="progress-ring" width="200" height="200">
                            <circle class="progress-ring-circle" stroke="white" stroke-width="4" fill="transparent" r="93" cx="100" cy="100" style="stroke-dasharray: 584, 584; stroke-dashoffset: 0;"></circle>
                        </svg>
                        <div class="timer-text">
                            <span id="minutes" class="time-value">25</span>
                            <span class="colon">:</span>
                            <span id="seconds" class="time-value">00</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="controls-section">
                <button id="startBtn" class="btn btn-primary">Start</button>
                <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
                <button id="resetBtn" class="btn btn-secondary">Reset</button>
            </div>
            
            <div class="settings-section">
                <div class="setting">
                    <label>Work Duration (minutes)</label>
                    <input type="number" id="workDuration" min="1" max="60" value="25" class="input-field">
                </div>
                <div class="setting">
                    <label>Break Duration (minutes)</label>
                    <input type="number" id="breakDuration" min="1" max="30" value="5" class="input-field">
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
