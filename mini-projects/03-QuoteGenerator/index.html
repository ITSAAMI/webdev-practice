<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="quote-app">
            <div class="header">
                <h1>Quote of the Day</h1>
                <p class="subtitle">Get inspired with random quotes</p>
            </div>
            
            <div class="quote-section">
                <div class="quote-content">
                    <svg class="quote-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M3 21c3 0 7-1 7-8V5c0-1.25-4.716-5-7-5m0 0c-1.5 2-1.5 5-1.5 8v3c0 1 0 4 1.5 6M21 5c0 1.25-4.716 5-7 5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <p id="quote" class="quote-text">Click the button to get inspired...</p>
                    <p id="author" class="quote-author">- Anonymous</p>
                </div>
            </div>
            
            <div class="button-group">
                <button id="newQuoteBtn" class="btn btn-primary">New Quote</button>
                <button id="copyBtn" class="btn btn-secondary">Copy</button>
                <button id="twitterBtn" class="btn btn-secondary">Share on Twitter</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
