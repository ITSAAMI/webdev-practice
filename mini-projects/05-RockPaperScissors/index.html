<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-app">
            <div class="header">
                <h1>Rock Paper Scissors</h1>
                <p class="subtitle">Play against the computer</p>
            </div>
            
            <div class="score-section">
                <div class="score-card">
                    <p class="score-label">Your Score</p>
                    <p id="playerScore" class="score">0</p>
                </div>
                <div class="score-card">
                    <p class="score-label">Computer Score</p>
                    <p id="computerScore" class="score">0</p>
                </div>
            </div>
            
            <div class="game-section">
                <div class="choices">
                    <button class="choice-btn" data-choice="rock" onclick="playGame('rock')">
                        <span class="choice-emoji">✊</span>
                        <span>Rock</span>
                    </button>
                    <button class="choice-btn" data-choice="paper" onclick="playGame('paper')">
                        <span class="choice-emoji">✋</span>
                        <span>Paper</span>
                    </button>
                    <button class="choice-btn" data-choice="scissors" onclick="playGame('scissors')">
                        <span class="choice-emoji">✌️</span>
                        <span>Scissors</span>
                    </button>
                </div>
                
                <div id="result" class="result" style="display: none;">
                    <p id="resultText" class="result-text"></p>
                    <p id="choicesDisplay" class="choices-display"></p>
                </div>
            </div>
            
            <div class="button-section">
                <button id="resetBtn" class="reset-btn" onclick="resetGame()">Reset Game</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
