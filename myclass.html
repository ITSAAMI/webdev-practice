<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mystyle.css">
    <title>Document</title>
    <style>
        /* reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .items {
            background-color: red;
            padding: 12px;
            margin: 12px;
            text-align: center;
            border-radius: 25%;
            width: 20%;
        }
        .items:hover{
            border: 12px solid black;
        }
    </style>
</head>

<body>

    <ul>
        <li class="items">1</li>
        <li class="items">2</li>
        <li class="items">3</li>
        <li class="items">4</li>
        <li class="items border">5</li>
        <li class="items">6</li>
        <li class="items">7</li>
        <li class="items">8</li>
    </ul>
</body>

</html>
